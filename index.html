function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function pick(rng,arr,n){const c=[...arr];const out=[];for(let i=0;i<n&&c.length;i++){out.push(c.splice(Math.floor(rng()*c.length),1)[0]);}return out;}

function buildPeople(){
  const cityNames=Object.keys(CITIES); const people=[];
  for(let i=0;i<54;i++){
    const rng=mulberry32(i*7919+13);
    const female=((i*13+7)%10)<3;
    const first=(female?FEMALE_FIRST:MALE_FIRST)[Math.floor(rng()*(female?FEMALE_FIRST:MALE_FIRST).length)];
    const last=(female?FEMALE_LAST:MALE_LAST)[Math.floor(rng()*(female?FEMALE_LAST:MALE_LAST).length)];
    const name=first+" "+last;
    const cityName=cityNames[Math.floor(rng()*cityNames.length)]; const city=CITIES[cityName];
    const role=ROLES[Math.floor(rng()*ROLES.length)]; const company=COMPANIES[Math.floor(rng()*COMPANIES.length)];
    const cats=pick(rng,CATEGORIES,1+Math.floor(rng()*2)); const pron=female?"She":"He";
    const about=`${name} is a ${role.toLowerCase()} based in ${cityName}, ${city.country}. ${pron} works at ${company}, focusing on ${cats.join(", ").toLowerCase()}. ${pron} combines hands-on engineering with applied research, and has collaborated with both fast-growing startups and large organizations across Europe and the US. ${pron} is part of the global Slovak AI community and open to collaboration, mentoring and knowledge exchange.`;
    people.push({ id:"p"+i, type:"person", name, role, company, gender:female?"f":"m", continent:continentOf(city.country),
      city:cityName, country:city.country, lat:city.lat, lng:city.lng, categories:cats,
      photo:`https://randomuser.me/api/portraits/${female?"women":"men"}/${i%99}.jpg`,
      about, experience:pick(rng,EXP_POOL,3), education:pick(rng,EDU_POOL,2), skills:pick(rng,SKILL_POOL,5+Math.floor(rng()*2)),
      social:{linkedin:"#",github:"#",twitter:"#"} });
  }
  return people;
}

function recommend(entity){
  if(entity.type==="person"){ const same=PEOPLE.filter(p=>p.id!==entity.id&&p.categories.some(c=>entity.categories.includes(c))); return (same.length>=3?same:PEOPLE.filter(p=>p.id!==entity.id)).slice(0,3); }

/* ============================================================ SHARED VISUALS ============================================================ */
function Photo({src,alt,initials,hue,className,style}){
  const [err,setErr]=useState(false);
  if(err||!src) return <div className={"flex items-center justify-center text-white font-semibold "+className} style={{...style,background:`hsl(${hue} 55% 55%)`}}>{initials}</div>;
  return <img src={src} onError={()=>setErr(true)} className={className} style={style} alt={alt}/>;
}
const initialsOf=(n)=>n.split(" ").map(w=>w[0]).slice(0,2).join("");
const hueOf=(n)=>(n.charCodeAt(0)*31+n.charCodeAt(n.length-1)*13)%360;
function Avatar({person,size=44,ring=true}){
  return <Photo src={person.photo} alt={person.name} initials={initialsOf(person.name)} hue={hueOf(person.name)}
    className={"rounded-full object-cover flex-shrink-0 "+(ring?"ring-2 ring-white shadow":"")} style={{width:size,height:size,fontSize:size*0.36}}/>;
}

function activeChips(filter){
  const chips=[];
  if(!filter.people) chips.push({key:"cat:people",label:"No people",remove:(f)=>({...f,people:true})});
  if(!filter.events) chips.push({key:"cat:events",label:"No events",remove:(f)=>({...f,events:true})});
  filter.focus.forEach(c=>chips.push({key:"f:"+c,label:c,remove:(f)=>({...f,focus:f.focus.filter(x=>x!==c)})}));
  filter.location.forEach(c=>chips.push({key:"l:"+c,label:c,remove:(f)=>({...f,location:f.location.filter(x=>x!==c)})}));
  filter.company.forEach(c=>chips.push({key:"c:"+c,label:c,remove:(f)=>({...f,company:f.company.filter(x=>x!==c)})}));
  return chips;
}
function MultiDropdown({label,options,selected,onToggle,renderIcon}){
  const [open,setOpen]=useState(false);
  const [rect,setRect]=useState(null);
  const btnRef=useRef(null);
  useEffect(()=>{
    if(!open)return;
    const close=(e)=>{ if(btnRef.current&&btnRef.current.contains(e.target))return; setOpen(false); };
    const onWin=()=>setOpen(false);
    document.addEventListener("mousedown",close); window.addEventListener("resize",onWin);
    return()=>{document.removeEventListener("mousedown",close);window.removeEventListener("resize",onWin);};
  },[open]);
  const toggleOpen=()=>{ if(!open&&btnRef.current)setRect(btnRef.current.getBoundingClientRect()); setOpen(o=>!o); };
  const count=selected.length;
  return (
    <>
      <button ref={btnRef} onClick={toggleOpen} className={"px-3 py-2 rounded-lg text-[14px] whitespace-nowrap flex items-center gap-1.5 flex-shrink-0 transition border "+(count?"text-brand font-semibold bg-brandSoft/40 border-brand/30":"text-slate-600 hover:text-ink border-slate-200")}>
        {label}{count>0&&<span className="min-w-5 h-5 px-1 rounded-full bg-brand text-white text-[11px] flex items-center justify-center">{count}</span>}
        <Icon.chevron size={15} cn={"transition-transform "+(open?"rotate-180":"")}/>
      </button>
      {open&&rect&&(
        <div className="fixed z-[65] w-64 bg-white rounded-xl shadow-xl border border-slate-100 p-1.5 fade-in" style={{left:Math.max(8,Math.min(rect.left,window.innerWidth-268)),top:rect.bottom+6}} onMouseDown={e=>e.stopPropagation()}>
          <div className="max-h-72 overflow-y-auto nice-scroll pr-0.5">
            {options.map(o=>{const on=selected.includes(o);return (
              <button key={o} onClick={()=>onToggle(o)} className="w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-left text-[14px] hover:bg-slate-50">
                <span className={"w-[18px] h-[18px] rounded flex items-center justify-center flex-shrink-0 "+(on?"bg-brand text-white":"border border-slate-300")}>{on&&<Icon.check size={12} sw={3}/>}</span>
                {renderIcon&&<span className="text-slate-400">{renderIcon(o)}</span>}
                <span className={on?"text-ink font-medium":"text-slate-700"}>{o}</span>
              </button>);})}
          </div>
        </div>
      )}
    </>
  );
}
function FilterBar({filter,setFilter,onOpenModal}){
  const chips=activeChips(filter);
  const catSel=[filter.people&&"People",filter.events&&"Events"].filter(Boolean);
  const tog=(key,v)=>setFilter(f=>({...f,[key]:f[key].includes(v)?f[key].filter(x=>x!==v):[...f[key],v]}));
  return (
    <div className="border-b border-slate-100 bg-white flex-shrink-0">
      <div className="px-4 md:px-6 pt-3 pb-2 flex items-center gap-2 overflow-x-auto no-scrollbar">
        <button onClick={onOpenModal} className="flex items-center gap-2 px-4 py-2 rounded-lg border border-slate-300 text-[14px] font-medium text-ink hover:border-slate-400 flex-shrink-0">
          <Icon.sliders size={16}/> Filters {chips.length>0 && <span className="min-w-5 h-5 px-1 rounded-full bg-ink text-white text-[11px] flex items-center justify-center">{chips.length}</span>}
        </button>
        <span className="w-px h-6 bg-slate-200 mx-0.5 flex-shrink-0"/>
        <MultiDropdown label="Category" options={["People","Events"]} selected={catSel} onToggle={(v)=>setFilter(f=>v==="People"?{...f,people:!f.people}:{...f,events:!f.events})}/>
        <MultiDropdown label="Zameranie" options={CATEGORIES} selected={filter.focus} onToggle={(v)=>tog("focus",v)} renderIcon={(c)=>catIcon(c,16)}/>
        <MultiDropdown label="Location" options={CONTINENTS} selected={filter.location} onToggle={(v)=>tog("location",v)}/>
        <MultiDropdown label="Company" options={ALL_COMPANIES} selected={filter.company} onToggle={(v)=>tog("company",v)}/>
      </div>
      {chips.length>0 && (
        <div className="px-4 md:px-6 pb-3 hidden md:flex flex-wrap gap-2">
          {chips.map(ch=>(
            <span key={ch.key} className="flex items-center gap-1.5 pl-3 pr-2 py-1.5 rounded-full bg-brandSoft/40 text-brandDark text-[13px] font-medium">
              {ch.label}<button onClick={()=>setFilter(ch.remove(filter))} className="w-4 h-4 rounded-full bg-white/70 flex items-center justify-center hover:bg-white"><Icon.x size={11}/></button>
            </span>
          ))}
          {chips.length>1 && <button onClick={()=>setFilter({people:true,events:true,focus:[],location:[],company:[]})} className="text-[13px] text-slate-400 hover:text-slate-600 underline ml-1">Clear</button>}
        </div>
      )}
    </div>
  );
}

function MapView({people,events,onOpen,highlighted,camRef,isMobile}){
  const wrapRef=useRef(null); const world=useWorld();
  const [size,setSize]=useState({w:1200,h:700});
  const [cam,setCam]=useState({k:1,x:0,y:0});
  const [hover,setHover]=useState(null);
  const drag=useRef(null);
  const hideTimer=useRef(null);
  useEffect(()=>{const ro=new ResizeObserver(es=>{for(const e of es){const{width,height}=e.contentRect;setSize({w:width,h:height});}});if(wrapRef.current)ro.observe(wrapRef.current);return()=>ro.disconnect();},[]);
  const projection=useMemo(()=>d3.geoMercator().center([12,38]).scale(size.w/6.6).translate([size.w/2,size.h/2]),[size.w,size.h]);
  const pathGen=useMemo(()=>projection?d3.geoPath(projection):null,[projection]);
  const allPts=useMemo(()=>[...people,...events].map(e=>{const p=projection([e.lng,e.lat]);return{e,bx:p[0],by:p[1]};}),[people,events,projection]);
  const screen=(bx,by)=>({x:cam.x+cam.k*bx,y:cam.y+cam.k*by});

  // unified clustering (people + events) — anything overlapping merges into a count bubble
  const clusters=useMemo(()=>{
    const R=46;
    const nodes=allPts.map(p=>({e:p.e,bx:p.bx,by:p.by,sx:cam.x+cam.k*p.bx,sy:cam.y+cam.k*p.by,used:false}));
    const out=[];
    for(let i=0;i<nodes.length;i++){if(nodes[i].used)continue;const grp=[nodes[i]];nodes[i].used=true;for(let j=i+1;j<nodes.length;j++){if(nodes[j].used)continue;const dx=nodes[i].sx-nodes[j].sx,dy=nodes[i].sy-nodes[j].sy;if(dx*dx+dy*dy<R*R){grp.push(nodes[j]);nodes[j].used=true;}}out.push({members:grp,sx:grp.reduce((a,n)=>a+n.sx,0)/grp.length,sy:grp.reduce((a,n)=>a+n.sy,0)/grp.length});}
    return out;
  },[allPts,cam]);

  const zoomAt=(factor,ox,oy)=>setCam(c=>{const nk=Math.max(1,Math.min(9,c.k*factor));const r=nk/c.k;return{k:nk,x:ox-r*(ox-c.x),y:oy-r*(oy-c.y)};});
  useEffect(()=>{if(!camRef)return;camRef.current={fit:(ids)=>{const sel=allPts.filter(p=>ids.includes(p.e.id));if(!sel.length)return;const xs=sel.map(p=>p.bx),ys=sel.map(p=>p.by);const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);const spanx=Math.max(60,maxx-minx),spany=Math.max(60,maxy-miny);const k=Math.max(1,Math.min(6,Math.min((size.w*0.7)/spanx,(size.h*0.7)/spany)));const cx=(minx+maxx)/2,cy=(miny+maxy)/2;setCam({k,x:size.w/2-k*cx,y:size.h/2-k*cy});}};},[allPts,size]);
  const onWheel=(e)=>{e.preventDefault();const r=wrapRef.current.getBoundingClientRect();zoomAt(e.deltaY<0?1.2:1/1.2,e.clientX-r.left,e.clientY-r.top);};
  const onDown=(e)=>{drag.current={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y,moved:false};};
  const onMove=(e)=>{if(!drag.current)return;const dx=e.clientX-drag.current.x,dy=e.clientY-drag.current.y;if(Math.abs(dx)+Math.abs(dy)>3)drag.current.moved=true;setCam(c=>({...c,x:drag.current.cx+dx,y:drag.current.cy+dy}));};
  const onUp=()=>{drag.current=null;};
  const hlSet=highlighted&&highlighted.length?new Set(highlighted):null;
  const openMarker=(e)=>{if(drag.current&&drag.current.moved)return;setHover(null);onOpen(e);};

  return (
    <div ref={wrapRef} className="relative w-full h-full overflow-hidden bg-[#d7ecfb] select-none" onWheel={onWheel} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp} style={{cursor:drag.current?"grabbing":"grab"}}>
      <svg width={size.w} height={size.h} className="absolute inset-0"><g transform={`translate(${cam.x},${cam.y}) scale(${cam.k})`}>{world&&pathGen&&world.features.map((f,i)=><path key={i} d={pathGen(f)} className="map-country"/>)}</g></svg>
      <div className="absolute inset-0">
        {clusters.map((cl,i)=>{
          if(cl.members.length===1){
            const {e}=cl.members[0];const dim=hlSet&&!hlSet.has(e.id);const hot=hlSet&&hlSet.has(e.id);const isP=e.type==="person";
            return (
              <button key={e.id} className="absolute -translate-x-1/2 -translate-y-1/2 transition-opacity" style={{left:cl.sx,top:cl.sy,opacity:dim?0.28:1,zIndex:hot?32:(isP?10:22)}}
                onMouseEnter={()=>{if(isMobile)return;if(hideTimer.current)clearTimeout(hideTimer.current);setHover({e,x:cl.sx,y:cl.sy});}} onMouseLeave={()=>{hideTimer.current=setTimeout(()=>setHover(null),160);}} onClick={(ev)=>{ev.stopPropagation();openMarker(e);}}>
                {hot&&<span className={"absolute inset-0 "+(isP?"rounded-full":"rounded-[9px]")+" bg-brand pulse-ring"}/>}
                {isP
                  ? <span className={"block rounded-full "+(hot?"ring-[3px] ring-brand":"ring-2 ring-white")+" shadow-md"}><Avatar person={e} size={hot?46:40} ring={false}/></span>
                  : <EventMarker e={e} hot={hot}/>}
              </button>
            );
          }
          const anyHot=hlSet&&cl.members.some(m=>hlSet.has(m.e.id));const allDim=hlSet&&!anyHot;
          return <button key={"c"+i} className="absolute -translate-x-1/2 -translate-y-1/2 flex items-center justify-center rounded-full bg-brand text-white font-semibold shadow-lg ring-4 ring-white/70 transition-opacity" style={{left:cl.sx,top:cl.sy,width:44,height:44,opacity:allDim?0.3:1,zIndex:anyHot?34:15}} onClick={(ev)=>{if(drag.current&&drag.current.moved)return;ev.stopPropagation();zoomAt(2.2,cl.sx,cl.sy);}}>{cl.members.length}</button>;
        })}
      </div>

      {hover&&(
        <div className="absolute z-[50] -translate-x-1/2" style={{left:hover.x,top:hover.y+14}}
          onMouseEnter={()=>{if(hideTimer.current)clearTimeout(hideTimer.current);}} onMouseLeave={()=>setHover(null)} onClick={()=>openMarker(hover.e)}>
          <div className="bg-white rounded-2xl shadow-2xl border border-slate-100 w-52 p-2.5 cursor-pointer">
            <div className="rounded-xl overflow-hidden bg-slate-100 aspect-[4/3] mb-2">
              {hover.e.type==="person"
                ? <Photo src={hover.e.photo} alt={hover.e.name} initials={initialsOf(hover.e.name)} hue={hueOf(hover.e.name)} className="w-full h-full object-cover text-2xl"/>
                : <Photo src={hover.e.photo} alt={hover.e.title} initials="EV" hue={210} className="w-full h-full object-cover"/>}
            </div>
            <div className="px-1 pb-0.5">
              <div className="font-semibold text-[14px] leading-snug">{hover.e.type==="person"?hover.e.name:hover.e.title}</div>
              <div className="text-brand text-[12.5px] leading-snug">{hover.e.type==="person"?hover.e.role:fmtDate(hover.e.date)+" · "+hover.e.time}</div>
              <div className="text-slate-400 text-[11.5px] flex items-center gap-1 mt-0.5"><Icon.pin size={11}/>{hover.e.city}, {hover.e.country}</div>
            </div>
          </div>
        </div>
      )}
      <div className="absolute top-4 right-4 z-30 flex flex-col bg-white rounded-xl shadow-md overflow-hidden">
        <button className="w-9 h-9 flex items-center justify-center hover:bg-slate-50" onClick={()=>zoomAt(1.4,size.w/2,size.h/2)}><Icon.plus size={18}/></button>
        <div className="h-px bg-slate-100"/>
        <button className="w-9 h-9 flex items-center justify-center hover:bg-slate-50" onClick={()=>zoomAt(1/1.4,size.w/2,size.h/2)}><Icon.minus size={18}/></button>
      </div>
    </div>
  );
}

      {nums.map(n=><button key={n} onClick={()=>onChange(n)} className={btn+" "+(n===page?"bg-brand text-white border-brand font-medium":"border-slate-200 text-slate-600 hover:border-slate-300")}>{n}</button>)}

const SUGGESTIONS=["Kto sa hodí na Machine Learning?","Nájdi expertov na Computer Vision","Aké AI eventy sú v Európe?","Kto pracuje v Google?"];
function runAssistant(query){
  const q=query.toLowerCase();
  const kw=[["machine learning","ml"],["computer vision","vision","cv","obraz"],["natural language","nlp","jazyk","language"],["data analysis","data","dáta","dat"],["planning","reasoning","plán"],["prediction","optim","predik"],["trustworthy","safety","bezpeč","fair"],["general intelligence","agi"],["applications","aplik"],["environment","klíma","climate","prostred"],["infrastructure","infra"],["robot"],["business","biznis","firm"],["cognitive","kognit"],["complex","komplex"]];
  let cat=null;for(let i=0;i<CATEGORIES.length;i++){if(kw[i].some(k=>q.includes(k))){cat=CATEGORIES[i];break;}}
  let company=null;for(const c of ALL_COMPANIES){if(q.includes(c.toLowerCase())){company=c;break;}}
  let city=null;for(const c of Object.keys(CITIES)){if(q.includes(c.toLowerCase())){city=c;break;}}
  const wantsEvents=/event|eventy|podujat|konferenc|meetup|summit|workshop/.test(q);
  const inEurope=/európ|europe/.test(q);
  if(wantsEvents){
    let ev=EVENTS.slice();if(cat)ev=ev.filter(e=>e.categories.includes(cat));if(city)ev=ev.filter(e=>e.city===city);if(company)ev=ev.filter(e=>e.company===company);if(inEurope)ev=ev.filter(e=>e.continent==="Europe");
    return {intro:ev.length?`Našiel som ${ev.length} ${ev.length===1?"event":"eventov"}${cat?" so zameraním "+cat:""}${inEurope?" v Európe":""}${city?" v "+city:""}. Zvýraznil som ich na mape:`:"Pre túto požiadavku som nenašiel žiadne eventy.",items:ev};
  }
  let ppl=PEOPLE.slice();if(cat)ppl=ppl.filter(p=>p.categories.includes(cat));if(company)ppl=ppl.filter(p=>p.company===company);if(city)ppl=ppl.filter(p=>p.city===city);if(inEurope)ppl=ppl.filter(p=>p.continent==="Europe");ppl=ppl.slice(0,8);
  if(!cat&&!company&&!city)return{intro:"Skús sa spýtať na konkrétne zameranie (napr. Machine Learning), firmu (napr. Google), mesto, alebo na eventy. Tu je pár ľudí z komunity:",items:PEOPLE.slice(0,5)};
  const parts=[];if(cat)parts.push("so zameraním "+cat);if(company)parts.push("z "+company);if(city)parts.push("v "+city);if(inEurope)parts.push("v Európe");
  return {intro:ppl.length?`Našiel som ${ppl.length} ${ppl.length===1?"človeka":"ľudí"} ${parts.join(", ")}. Zvýraznil som ich na mape:`:`Nenašiel som nikoho ${parts.join(", ")}.`,items:ppl};
}

/* ============================================================ APP ROOT ============================================================ */
function App(){
  const [page,setPage]=useState("app");
  const [view,setView]=useState("map");
  const [filter,setFilter]=useState({people:true,events:true,focus:[],location:[],company:[]});
  const [filtersOpen,setFiltersOpen]=useState(false);
  const [detail,setDetail]=useState(null); // {mode:'map'|'page', stack:[...]}
  const [chatOpen,setChatOpen]=useState(false);
  const [highlighted,setHighlighted]=useState([]);
  const [auth,setAuth]=useState(null);
  const [welcomeDismissed,setWelcomeDismissed]=useState(false);
  const [isMobile,setIsMobile]=useState(false);
  const EMPTY_PROFILE={photo:null,headline:"",country:"",city:"",address:"",title:"",company:"",employment:"Full-time",focus:[],exp:[{r:"",c:"",p:""}],skills:[],socials:[{network:"LinkedIn",url:""}]};
  const camRef=useRef(null);
  useEffect(()=>{const m=window.matchMedia("(max-width:767px)");const on=()=>setIsMobile(m.matches);on();
    if(m.addEventListener)m.addEventListener("change",on); else m.addListener(on);
    return()=>{if(m.removeEventListener)m.removeEventListener("change",on); else m.removeListener(on);};},[]);

  const matchPerson=(p)=>(!filter.focus.length||p.categories.some(c=>filter.focus.includes(c)))&&(!filter.location.length||filter.location.includes(p.continent))&&(!filter.company.length||filter.company.includes(p.company));
  const matchEvent=(e)=>(!filter.focus.length||e.categories.some(c=>filter.focus.includes(c)))&&(!filter.location.length||filter.location.includes(e.continent))&&(!filter.company.length||filter.company.includes(e.company));
  const people=useMemo(()=>filter.people?PEOPLE.filter(matchPerson):[],[filter]);
  const events=useMemo(()=>filter.events?EVENTS.filter(matchEvent):[],[filter]);

  const mapPeople=useMemo(()=>{ if(!highlighted.length)return people; const set=new Set(people.map(e=>e.id)); return [...people,...PEOPLE.filter(p=>highlighted.includes(p.id)&&!set.has(p.id))]; },[people,highlighted]);
  const mapEvents=useMemo(()=>{ if(!highlighted.length)return events; const set=new Set(events.map(e=>e.id)); return [...events,...EVENTS.filter(e=>highlighted.includes(e.id)&&!set.has(e.id))]; },[events,highlighted]);

  useEffect(()=>{if(highlighted.length&&camRef.current&&view==="map"&&page==="app"){const t=setTimeout(()=>camRef.current&&camRef.current.fit(highlighted),60);return()=>clearTimeout(t);}},[highlighted,view,page]);

  const go=(p)=>{setPage(p);setDetail(null);};
  const openMap=(e)=>setDetail({mode:"map",stack:[e]});
  const openPage=(e)=>setDetail({mode:"page",stack:[e]});
  const openChat=(e)=>setDetail({mode:"chat",stack:[e]});
  const push=(e)=>setDetail(d=>({...d,stack:[...d.stack,e]}));
  const back=()=>setDetail(d=>{const s=d.stack.slice(0,-1);return s.length?{...d,stack:s}:null;});
  const closeDetail=()=>setDetail(null);
  const handleSignup=(u)=>{
    if(u.role==="member"){ setAuth({...u,...EMPTY_PROFILE,role:"member",status:"approved"}); setWelcomeDismissed(true); go("app"); }
    else { setAuth({...u,...EMPTY_PROFILE,role:"expert",status:"incomplete"}); setWelcomeDismissed(false); go("profile-edit"); }
  };
  const handleLogin=()=>{ setAuth({firstName:"Ján",lastName:"Novák",email:"jan.novak@example.com",role:"expert",status:"approved",...EMPTY_PROFILE,headline:"ML Engineer @ KInIT | Applied AI",title:"Machine Learning Engineer",company:"KInIT",city:"Bratislava",country:"Slovakia",focus:["Machine Learning"],skills:["Python","PyTorch"],socials:[{network:"LinkedIn",url:"https://linkedin.com/in/jannovak"}]}); setWelcomeDismissed(true); go("app"); };
  const handleLogout=()=>{ setAuth(null); setWelcomeDismissed(false); go("app"); };
  const handleProfileSave=(d)=>{
    const wasIncomplete = auth && auth.status==="incomplete";
    setAuth(a=>({...a,...d,status: wasIncomplete?"pending":a.status}));
    if(wasIncomplete){ go("pending"); }
    else { setWelcomeDismissed(false); go("app"); }
  };
  const handleApprove=()=>setAuth(a=>a?{...a,status:"approved"}:a);

  const pageDetail = detail&&detail.mode==="page";
  const content=()=>{
    if(page==="signup")return <SignupPage go={go} onSignup={handleSignup} toLogin={()=>go("login")}/>;
    if(page==="login")return <LoginPage go={go} onLogin={handleLogin} toRegister={()=>go("signup")}/>;
    if(page==="pending")return auth?<PendingPage auth={auth} go={go} onApprove={handleApprove}/>:<SignupPage go={go} onSignup={handleSignup} toLogin={()=>go("login")}/>;
    if(page==="profile-edit")return !auth
      ? <SignupPage go={go} onSignup={handleSignup} toLogin={()=>go("login")}/>
      : (auth.status==="pending" ? <PendingPage auth={auth} go={go} onApprove={handleApprove}/> : <ProfileEditPage auth={auth} go={go} onLogout={handleLogout} onSave={handleProfileSave}/>);
    if(page==="about")return <AboutPage go={go}/>;
    if(page==="people")return pageDetail?<PageDetail stack={detail.stack} onBack={back} onOpen={push}/>:<PeopleGrid people={people} onOpen={openPage}/>;
    if(page==="events")return pageDetail?<PageDetail stack={detail.stack} onBack={back} onOpen={push}/>:<EventsPage events={events} onOpen={openPage}/>;
    if(pageDetail) return <PageDetail stack={detail.stack} onBack={back} onOpen={push}/>;
    return view==="map" ? <MapView people={mapPeople} events={mapEvents} onOpen={openMap} highlighted={highlighted} camRef={camRef} isMobile={isMobile}/> : <ListView people={people} events={events} filter={filter} onOpen={openPage}/>;
  };
  const showFilterBar = !pageDetail && (page==="app"||page==="people"||page==="events");

  return (
    <div className="h-full flex">
      <div className="flex-1 min-w-0 h-full flex flex-col">
        <Header page={page} go={go} auth={auth} onRegister={()=>go("signup")} onLogin={()=>go("login")} onLogout={handleLogout} onProfile={()=>go(auth&&auth.status==="pending"?"pending":"profile-edit")}/>
        {showFilterBar && <FilterBar filter={filter} setFilter={(upd)=>{setFilter(prev=>typeof upd==="function"?upd(prev):upd);setHighlighted([]);}} onOpenModal={()=>setFiltersOpen(true)}/>}
        {page==="app" && highlighted.length>0 && (
          <div className="bg-brandSoft/25 border-b border-brand/10 flex-shrink-0"><div className="px-4 md:px-6 py-2 flex items-center gap-2 text-[13px] text-brandDark"><Icon.spark size={15}/> AI zvýraznil {highlighted.length} výsledkov na mape.<button onClick={()=>setHighlighted([])} className="ml-auto underline hover:no-underline">Zrušiť</button></div></div>
        )}
        {page==="app" && auth && auth.status==="pending" && (
          <div className="bg-amber-50 border-b border-amber-100 flex-shrink-0">
            <div className="px-4 md:px-6 py-2.5 flex items-center gap-2.5 text-[13px] text-amber-700">
              <span className="w-2 h-2 rounded-full bg-amber-400 animate-pulse"/>Tvoja žiadosť čaká na schválenie.
              <button onClick={()=>go("pending")} className="ml-auto underline hover:no-underline">Zobraziť stav</button>
            </div>
          </div>
        )}
        {page==="app" && auth && auth.role==="expert" && auth.status==="approved" && !welcomeDismissed && completeness(auth)<100 && (
          <div className="bg-brandSoft/25 border-b border-brand/10 flex-shrink-0">
            <div className="px-4 md:px-6 py-2.5 flex items-center gap-3 text-[13px]">
              <AuthAvatar auth={auth} size={28}/>
              <span className="text-slate-700 truncate">Vitaj, <b>{auth.firstName}</b>! Doplň si profil, aby ťa ostatní našli.</span>
              <div className="hidden sm:flex items-center gap-2 ml-1"><div className="w-24 h-1.5 rounded-full bg-white overflow-hidden"><div className="h-full bg-brand" style={{width:completeness(auth)+"%"}}/></div><span className="text-slate-500">{completeness(auth)}%</span></div>
              <button onClick={()=>go("profile-edit")} className="ml-auto flex-shrink-0 px-3 py-1.5 rounded-lg bg-brand text-white font-medium hover:bg-brandDark">Doplniť profil</button>
              <button onClick={()=>setWelcomeDismissed(true)} className="text-slate-400 hover:text-slate-600 flex-shrink-0"><Icon.x size={16}/></button>
            </div>
          </div>
        )}
        <div className="flex-1 min-h-0 relative overflow-hidden">
          {content()}
          {page==="app" && !pageDetail && (
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-[44]">
              {view==="map"
                ? <button onClick={()=>setView("list")} className="flex items-center gap-2 px-5 py-3 rounded-xl bg-navy text-white shadow-xl hover:bg-ink transition font-medium"><Icon.list size={18}/> Show List</button>
                : <button onClick={()=>setView("map")} className="flex items-center gap-2 px-5 py-3 rounded-xl bg-navy text-white shadow-xl hover:bg-ink transition font-medium"><Icon.map size={18}/> Show Map</button>}
            </div>
          )}
          {(page==="people"||page==="events") && !pageDetail && (
            <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-[44]">
              <button onClick={()=>{go("app");setView("map");}} className="flex items-center gap-2 px-5 py-3 rounded-xl bg-navy text-white shadow-xl hover:bg-ink transition font-medium"><Icon.map size={18}/> Show Map</button>
            </div>
          )}
          {!chatOpen && <button onClick={()=>setChatOpen(true)} className="absolute bottom-6 right-6 z-[45] flex items-center justify-center gap-2 w-14 h-14 md:w-auto md:h-auto md:px-5 md:py-3.5 rounded-full bg-brandSoft text-brandDark shadow-lg hover:brightness-95 transition font-medium"><Icon.spark size={24}/><span className="hidden md:inline">Ask AI</span></button>}
          {page==="app" && detail&&detail.mode==="map" && <Sidebar stack={detail.stack} onBack={back} onClose={closeDetail} onOpen={push}/>}
        </div>
      </div>
      {chatOpen && <ChatPanel onClose={()=>setChatOpen(false)} onOpenEntity={(e)=>{ if(isMobile){openChat(e);} else {setPage("app");openMap(e);} }} onHighlight={setHighlighted} toMap={()=>{setPage("app");setView("map");setDetail(null);}}/>}
      {detail && detail.mode==="chat" && (
        <div className="fixed inset-0 z-[62] bg-white flex flex-col">
          <div className="flex items-center px-3 py-3 border-b border-slate-100 flex-shrink-0">
            <button onClick={back} className="flex items-center gap-1.5 text-[14px] font-medium text-slate-600 px-2 py-1.5 rounded-lg hover:bg-slate-100"><Icon.back size={18}/>{detail.stack.length>1?"Späť":"Späť do chatu"}</button>
          </div>
          <div className="flex-1 overflow-auto nice-scroll">
            <div className="max-w-[760px] mx-auto px-3 md:px-5 py-4">
              <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden"><DetailBody entity={detail.stack[detail.stack.length-1]} onOpen={push}/></div>
              <RecommendedBox entity={detail.stack[detail.stack.length-1]} onOpen={push}/>
            </div>
          </div>
        </div>
      )}
      {filtersOpen && <FiltersModal initial={filter} onApply={(f)=>{setFilter(f);setHighlighted([]);setFiltersOpen(false);}} onClose={()=>setFiltersOpen(false)}/>}
    </div>
  );
}
const rootEl=document.getElementById("root");
rootEl.dataset.mounted="1";
ReactDOM.createRoot(rootEl).render(<App/>);
</script>

<script>
  (function () {
    var tries = 0;
    function boot() {
      var ready = window.Babel && window.React && window.ReactDOM && window.d3 && window.topojson;
      if (!ready) { if (tries++ > 200) throw new Error("Knižnice sa nenačítali z CDN (React/Babel/d3). Skontroluj internet."); setTimeout(boot, 30); return; }
      try {
        var src = document.getElementById("app-src").textContent;
        var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
        var s = document.createElement("script");
        s.textContent = "(function(){\n" + out + "\n})();";
        document.body.appendChild(s);
      } catch (e) {
        document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#b00">Chyba: ' + e.message + '</div>';
        console.error(e);
      }
    }
    boot();
  })();
</script>
</body>
</html>
